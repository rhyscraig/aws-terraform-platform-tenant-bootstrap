name: "Terraform — terrorgem"

on:
  push:
    branches:
      - main
    paths:
      - "seed-terraform/**"
      - "configs/orgs/terrorgem.tfvars"
      - ".github/workflows/terraform-terrorgem.yml"
  workflow_dispatch:

# One deployment at a time per branch.
concurrency:
  group: terraform-terrorgem-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC token exchange
  contents: read

env:
  # Org identifier — must match configs/orgs/<ORG>.tfvars
  ORG: terrorgem
  # AWS_REGION is derived from tfvars by the Makefile;
  # configure-aws-credentials also sets it in the environment.
  AWS_REGION: eu-west-2

jobs:
  # ── 1. PLAN ────────────────────────────────────────────────────────────────
  # Runs immediately — no approval gate.
  # Uses `terrorgem` environment (has secrets).
  # Encrypted plan is written to the logs S3 bucket for the apply job.
  plan:
    name: "Plan"
    runs-on: ubuntu-latest
    environment: terrorgem
    outputs:
      plan_s3_key: ${{ steps.upload-plan.outputs.plan_s3_key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.SEED_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: make tf-init-ci ORG=${{ env.ORG }}
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          KMS_KEY_ID: ${{ secrets.KMS_KEY_ID }}

      - name: Terraform Plan
        run: make tf-plan-ci ORG=${{ env.ORG }}

      - name: Encrypt and upload plan to S3
        id: upload-plan
        run: |
          PLAN_KEY="${{ env.ORG }}/plans/tfplan-${{ github.sha }}-${{ github.run_id }}.enc"
          openssl enc -aes-256-cbc -pbkdf2 -iter 100000 \
            -pass pass:"${{ secrets.PLAN_PASSPHRASE }}" \
            -in "seed-terraform/tfplan" \
            -out tfplan.enc
          aws s3 cp tfplan.enc "s3://${{ secrets.TF_LOGS_BUCKET }}/${PLAN_KEY}"
          echo "plan_s3_key=${PLAN_KEY}" >> "$GITHUB_OUTPUT"
          echo "✅ Plan uploaded to s3://${{ secrets.TF_LOGS_BUCKET }}/${PLAN_KEY}"

  # ── 2. GATE ────────────────────────────────────────────────────────────────
  # Human approval step.
  # Uses `terrorgem-approve` environment (no secrets — reviewers approve
  # after seeing the plan output above, before any apply runs).
  gate:
    name: "Approve"
    runs-on: ubuntu-latest
    needs: plan
    environment: terrorgem-approve
    steps:
      - name: Approved
        run: echo "✅ Deployment approved — proceeding to apply"

  # ── 3. APPLY ───────────────────────────────────────────────────────────────
  # Downloads the exact plan from step 1, decrypts, applies.
  # No re-plan — what was approved is what runs.
  apply:
    name: "Apply"
    runs-on: ubuntu-latest
    needs: [plan, gate]
    environment: terrorgem

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.SEED_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: make tf-init-ci ORG=${{ env.ORG }}
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          KMS_KEY_ID: ${{ secrets.KMS_KEY_ID }}

      - name: Download and decrypt plan from S3
        run: |
          aws s3 cp \
            "s3://${{ secrets.TF_LOGS_BUCKET }}/${{ needs.plan.outputs.plan_s3_key }}" \
            tfplan.enc
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 \
            -pass pass:"${{ secrets.PLAN_PASSPHRASE }}" \
            -in tfplan.enc \
            -out "seed-terraform/tfplan"
          echo "✅ Plan decrypted"

      - name: Terraform Apply
        run: make tf-apply ORG=${{ env.ORG }}

      - name: Clean up plan artifact from S3
        if: always()
        run: |
          aws s3 rm \
            "s3://${{ secrets.TF_LOGS_BUCKET }}/${{ needs.plan.outputs.plan_s3_key }}" \
            || echo "⚠️  Could not delete plan artifact (non-fatal)"
